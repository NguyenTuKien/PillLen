services:
  database:
    image: mongo:7
    restart: always
    env_file:
      - .env
    volumes:
      - ./database/mongo-data:/data/db
      - ./database/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pharmagent

  backend:
    build: ./backend
    image: ${DOCKER_REGISTRY:-ngtukien218}/pharmagent-backend:${BACKEND_VERSION:-latest}
    restart: always
    env_file:
      - .env
    environment:
      SPRING_MONGODB_URI: mongodb://${SPRING_MONGODB_USERNAME}:${SPRING_MONGODB_PASSWORD}@database:27017/${SPRING_MONGODB_DATABASE}?authSource=admin
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep UP" ]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - pharmagent

  frontend:
    build: ./frontend
    image: ${DOCKER_REGISTRY:-ngtukien218}/pharmagent-frontend:${FRONTEND_VERSION:-latest}
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pharmagent

networks:
  pharmagent:
    driver: bridge